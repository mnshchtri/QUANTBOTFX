version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: quantbot_db
    restart: always
    environment:
      POSTGRES_USER: quantuser
      POSTGRES_PASSWORD: quantpassword
      POSTGRES_DB: quantbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
