name: QuantBotFX CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: mnshchtri/quantbotfx

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache-dependency-path: frontend/package-lock.json

      - name: Install C++ Backend Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libpq-dev

      - name: Calculate Version and Tags
        id: vars
        run: |
          VERSION=$(grep '"version":' frontend/package.json | cut -d '"' -f 4 || echo "1.0.0")
          IMAGE_TAG="v${VERSION}.${{ github.run_number }}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Backend CI
        run: |
          cd backend
          cmake -S . -B build
          cmake --build build -j$(nproc)

      - name: Frontend CI
        run: |
          cd frontend
          npm ci
          CI=false npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: mnshchtri
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Docker Image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
