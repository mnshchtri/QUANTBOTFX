# QuantBotForex Configuration
# AI-Driven Forex Trading Platform

# Application Settings
app:
  name: "QuantBotForex"
  version: "2.0.0"
  environment: "development"  # development, staging, production
  debug: true
  host: "0.0.0.0"
  port: 8000
  workers: 4

# Database Configuration
database:
  url: "sqlite:///./quantbot_forex.db"
  echo: false
  pool_size: 10
  max_overflow: 20

# API Configuration
api:
  title: "QuantBotForex API"
  description: "AI-Driven Forex Trading Platform API"
  version: "2.0.0"
  docs_url: "/docs"
  redoc_url: "/redoc"

# Trading Configuration
trading:
  # OANDA API Settings
  oanda:
    api_key: "5d8fa14f91b6b0004929c07409dd9000-087ffb0d480ffdb7f1fced84eebb362a"
    account_id: "101-001-30612983-001"
    base_url: "https://api-fxpractice.oanda.com"
    environment: "practice"  # practice, live
    
  # Default Trading Parameters
  default_instrument: "GBP_JPY"
  default_timeframe: "M15"
  max_position_size: 10000
  risk_percentage: 2.0
  
  # Supported Instruments
  instruments:
    - "EUR_USD"
    - "GBP_USD"
    - "USD_JPY"
    - "GBP_JPY"
    - "EUR_JPY"
    - "AUD_USD"
    - "USD_CAD"
    - "NZD_USD"
    - "USD_CHF"
    - "EUR_GBP"
    
  # Supported Timeframes
  timeframes:
    - "M1"
    - "M5"
    - "M15"
    - "H1"
    - "H4"
    - "D1"

# AI & Machine Learning
ai:
  # Model Settings
  model_path: "./models/"
  model_version: "1.0.0"
  
  # Feature Engineering
  feature_window: 50
  prediction_horizon: 5
  
  # Training Parameters
  training:
    epochs: 100
    batch_size: 32
    validation_split: 0.2
    learning_rate: 0.001

# Indicators Configuration
indicators:
  # Technical Indicators
  rsi:
    period: 14
    overbought: 70
    oversold: 30
    
  macd:
    fast_period: 12
    slow_period: 26
    signal_period: 9
    
  bollinger_bands:
    period: 20
    std_dev: 2
    
  stochastic:
    k_period: 14
    d_period: 3
    
  # Custom Indicators
  custom_indicators: []

# Risk Management
risk_management:
  max_drawdown: 10.0  # percentage
  stop_loss: 2.0  # percentage
  take_profit: 4.0  # percentage
  max_trades_per_day: 10
  correlation_threshold: 0.7

# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "./logs/quantbot_forex.log"
  max_size: "10MB"
  backup_count: 5

# Monitoring & Metrics
monitoring:
  enabled: true
  metrics_port: 9090
  health_check_interval: 30
  
# Frontend Configuration
frontend:
  url: "http://localhost:3000"
  cors_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
    
# Development Settings
development:
  debug_mode: true
  hot_reload: true
  
# Production Settings
production:
  ssl_enabled: false
  rate_limiting: true
  max_requests_per_minute: 1000
